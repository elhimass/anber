<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anber - Bientôt Disponible</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0f0f0f, #1c1c1c);
      color: white;
      text-align: center;
      padding: 20px;
    }

    .container {
      max-width: 600px;
    }

    .logo {
      width: 120px;
      height: 120px;
      object-fit: contain;
      margin-bottom: 20px;
      border-radius: 20px;
      background: rgba(255,255,255,0.05);
      padding: 10px;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 20px;
      letter-spacing: 2px;
    }

    p {
      font-size: 1.2rem;
      opacity: 0.8;
      margin-bottom: 30px;
    }

    .tag {
      display: inline-block;
      padding: 10px 20px;
      border: 1px solid white;
      border-radius: 30px;
      font-size: 0.9rem;
      margin-bottom: 30px;
    }

    .notify-btn {
      padding: 12px 25px;
      background: white;
      color: black;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }

    .notify-btn:hover {
      background: #d4af37;
      color: black;
    }

    footer {
      position: absolute;
      bottom: 20px;
      font-size: 0.8rem;
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <div class="container">
   

    <div class="tag">✨ Anber - Maison de parfum</div>
    <h1>Bientôt Disponible</h1>
    <p>La boutique Anber arrive bientôt. Des fragrances uniques, élégantes et modernes inspirées du luxe vous attendent.</p>
    <button class="notify-btn">Me prévenir</button>
  </div>

  <footer>
    © 2026 Anber - Tous droits réservés
  </footer>
</body>
</html>
