<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anber — Boutique</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Montserrat:wght@200;300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">

<body data-page="products">

      <div class="nav-links">

        <a href="products.html">Boutique</a>
      </div>
    </div>
  </nav>

  <main class="page-wrapper">
    <section class="section">
      <div class="section-header">
        <p class="hero-eyebrow">Boutique</p>
        <h2 class="section-title">Explorez chaque parfum</h2>

      <div class="filter-row" id="categoryFilters"></div>
      <div id="productsGrid" class="product-grid"></div>
    </section>
  </main>

  <footer class="page-wrapper footer">
    <div class="footer-inner">
      <p class="footer-text">© 2026 Anber — Maison de parfums</p>
      <a class="btn-outline" href="index.html">Retour à l'accueil</a>
